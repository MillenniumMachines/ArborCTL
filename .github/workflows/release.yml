# Publish a GitHub Release with the DWC plugin ZIP only (ArborCTL-<version>.zip).
# Trigger: push a tag matching v* (e.g. v0.2.0).

on:
  push:
    tags:
      - 'v*'

name: Release DWC plugin

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout ArborCTL
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Clone DuetWebControl (matches dwc-plugin plugin.json dwcVersion)
        run: |
          git clone --depth 1 -b v3.6.1 https://github.com/Duet3D/DuetWebControl.git dwc-work
          cd dwc-work
          npm ci || npm install

      - name: Build plugin zip
        run: |
          chmod +x dist/build-dwc-plugin.sh
          dist/build-dwc-plugin.sh "$(pwd)/dwc-work" "${{ github.ref_name }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: dist/ArborCTL-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
